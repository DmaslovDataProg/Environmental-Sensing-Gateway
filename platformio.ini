[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

; Libraries - PlatformIO will download these automatically
lib_deps =
    adafruit/Adafruit BME280 Library @ ^2.2.4
    adafruit/Adafruit Unified Sensor @ ^1.1.14

; Build Flags (Professional approach to define constants)
build_flags = 
    -D CORE_DEBUG_LEVEL=3
    -D BATTERY_CAPACITY_MAH=2000.0